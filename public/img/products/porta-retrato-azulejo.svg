<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Porta Retrato em Azulejo">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="800" height="800" rx="64" fill="url(#bg)"/>
  <circle cx="650" cy="140" r="90" fill="#ffffff22"/>
  <circle cx="120" cy="690" r="130" fill="#ffffff14"/>
  <rect x="120" y="120" width="560" height="560" rx="48" fill="#ffffff20" stroke="#ffffff35"/>
  <text x="400" y="350" text-anchor="middle" font-size="150" font-family="Arial, sans-serif" filter="url(#shadow)">🖼️</text>
  <text x="400" y="540" text-anchor="middle" font-size="44" font-weight="700" fill="#fff" font-family="Arial, sans-serif">Porta Retrato em Azulejo</text>
  <text x="400" y="592" text-anchor="middle" font-size="24" fill="#ffffffcc" font-family="Arial, sans-serif">Artize Personalizados</text>
</svg>
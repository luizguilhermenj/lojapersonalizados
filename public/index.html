<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja de Teste - Mercado Pago</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="hero-content">
        <p class="eyebrow">Ambiente de testes</p>
        <h1>Loja de teste com Mercado Pago</h1>
        <p class="hero-description">
          Escolha um produto fictício, informe seus dados e siga para o Checkout Pro do Mercado Pago.
        </p>
      </div>
    </header>

    <section id="catalog" class="catalog"></section>
  </main>

  <template id="product-template">
    <article class="product-card">
      <div class="product-visual">
        <img class="product-image" src="" alt="">
      </div>

      <div class="product-body">
        <h2 class="product-name"></h2>
        <p class="product-description"></p>
        <div class="product-price"></div>

        <form class="buy-form">
          <input type="hidden" name="productId" value="">

          <label class="field">
            <span>Seu nome</span>
            <input
              type="text"
              name="name"
              value="Comprador de Teste"
              placeholder="Digite seu nome"
              required
            >
          </label>

          <label class="field">
            <span>Seu e-mail</span>
            <input
              type="email"
              name="email"
              value="teste@teste.com"
              placeholder="Digite seu e-mail"
              required
            >
          </label>

          <label class="field">
            <span>Quantidade</span>
            <input
              type="number"
              name="quantity"
              value="1"
              min="1"
              step="1"
              required
            >
          </label>

          <button type="submit" class="buy-button">
            Comprar no Mercado Pago
          </button>

          <p class="feedback" aria-live="polite"></p>
        </form>
      </div>
    </article>
  </template>

  <script src="/script.js"></script>
</body>
</html>
